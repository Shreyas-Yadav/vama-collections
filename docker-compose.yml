services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vama
      POSTGRES_USER: vama
      POSTGRES_PASSWORD: vama
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vama -d vama"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./vama-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/vama
      DB_USERNAME: vama
      DB_PASSWORD: vama
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./vama-frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
